name = "arcreply"
main = "worker.js"
compatibility_date = "2024-03-05"

# Secrets (set via wrangler secret put)
# TELEGRAM_BOT_TOKEN
# TWITTER_API_KEY
# GROQ_API_KEY

[observability]
enabled = true

[env.production]
name = "arcreply1-prod"
vars = { ENVIRONMENT = "production", LOG_LEVEL = "info" }

[env.staging]
name = "arcreply1-staging"
vars = { ENVIRONMENT = "staging", LOG_LEVEL = "debug" }
